name: "csfm_library_plus"
environment:
  sdk: '^3.9.0'

flutter:
  uses-material-design: true

dependencies:
 
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.1.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  image_picker: ^1.2.1
  flutter_local_notifications: ^17.0.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.12.2
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
